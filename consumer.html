<!DOCTYPE html>
<html>

<head>

    <title>Consumer Monitoring</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            font-family: Arial;
            color: white;
        }

        .header {
            padding: 20px;
            background: #111827;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #1f2937;
        }

        .chat {
            padding: 20px;
            height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .message {
            background: #1e293b;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 15px;
            max-width: 700px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .status {
            color: #22c55e;
            font-weight: bold;
        }

        .text {
            font-size: 18px;
            line-height: 1.5;
        }

        .time {
            opacity: 0.7;
            font-size: 12px;
        }
    </style>

</head>

<body>

<div class="header">
    📡 Consumer Monitoring Chat
</div>

<div class="chat" id="chat"></div>

<script>

async function loadMessages() {

    const res = await fetch("http://localhost:8000/consumer/messages");
    const data = await res.json();

    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.forEach(msg => {

        const div = document.createElement("div");
        div.className = "message";

        div.innerHTML = `
            <div class="top">

                <div class="status">
                    📩 Получено
                </div>

                <div class="time">
                    ${msg.time}
                </div>

            </div>

            <div class="text">
                ${msg.text}
            </div>
        `;

        chat.appendChild(div);
    });
}

loadMessages();
setInterval(loadMessages, 2000);

</script>

</body>
</html>
