<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Consumer Monitoring Chat</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .header {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .status {
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .connected { background: green; }
        .disconnected { background: red; }

        #messages {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
        }

        .text {
            font-size: 16px;
        }

        .meta {
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="header">📡 Consumer Monitoring Chat</div>

<div id="status" class="status disconnected">🔴 Disconnected</div>

<div id="messages"></div>

<script>
    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");

    function setStatus(ok) {
        statusEl.textContent = ok ? "🟢 Connected" : "🔴 Disconnected";
        statusEl.className = "status " + (ok ? "connected" : "disconnected");
    }

    function addMessage(msg) {
        const div = document.createElement("div");
        div.className = "msg";

        div.innerHTML = `
            <div class="text">${msg.text}</div>
            <div class="meta">
                ${msg.time || ""} | ${msg.status || "Отправлено"}
            </div>
        `;

        messagesEl.prepend(div);
    }

    // ───────────────
    // HISTORY LOAD
    // ───────────────
    async function loadHistory() {
        try {
            const res = await fetch("/internal/history");
            const data = await res.json();

            data
                .reverse()
                .filter(msg => msg.status !== "Ошибка отправки")
                .forEach(addMessage);
        } catch (e) {
            console.error("history error", e);
        }
    }

    // ───────────────
    // WS CONNECT
    // ───────────────
    function connectWS() {
        const ws = new WebSocket("ws://localhost:8000/ws/consumer");

        ws.onopen = () => {
            setStatus(true);
            console.log("WS OPEN");
        };

        ws.onclose = () => {
            setStatus(false);
            console.log("WS CLOSED");
            setTimeout(connectWS, 2000);
        };

        ws.onerror = (e) => {
            setStatus(false);
            console.log("WS ERROR", e);
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            addMessage(data);
        };
    }

    // старт
    loadHistory();
    connectWS();

</script>

</body>
</html>
